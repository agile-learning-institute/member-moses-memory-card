apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    component: server
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: node-exporter
        static_configs:
          - targets: ['node-exporter.monitoring:9100']

      - job_name: nginx-exporter
        static_configs:
          - targets: ['memory-card-service.memory-card:9113']
